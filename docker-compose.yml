version: "3.9"

# ─────────────────────────────────────────────────────────────
#  FoodBridge – Docker Compose
#  Services: mongodb | backend | frontend
# ─────────────────────────────────────────────────────────────

services:

  # ── MongoDB 7 ──────────────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: foodbridge-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: foodbridge
      MONGO_INITDB_ROOT_PASSWORD: foodbridge123
      MONGO_INITDB_DATABASE: foodbridge
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - foodbridge-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Spring Boot Backend ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodbridge-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      MONGODB_URI: mongodb://foodbridge:foodbridge123@mongodb:27017/foodbridge?authSource=admin
      SERVER_PORT: 8080
      JWT_SECRET: foodbridge-super-secret-key-change-in-production-min-32-chars
    ports:
      - "8080:8080"
    networks:
      - foodbridge-net

  # ── React + Vite Frontend ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: foodbridge-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    networks:
      - foodbridge-net

# ── Volumes ────────────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local

# ── Networks ───────────────────────────────────────────────
networks:
  foodbridge-net:
    driver: bridge
