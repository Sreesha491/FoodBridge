version: "3.9"

# ─────────────────────────────────────────────────────────────
#  FoodBridge – Docker Compose
#  Services: mysql | backend | frontend
# ─────────────────────────────────────────────────────────────

services:

  # ── MySQL 8 ────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: foodbridge-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: foodbridge
      MYSQL_USER: foodbridge
      MYSQL_PASSWORD: foodbridge123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - foodbridge-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "foodbridge", "-pfoodbridge123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Spring Boot Backend ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodbridge-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      MYSQL_URL: jdbc:mysql://mysql:3306/foodbridge?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      MYSQL_USERNAME: foodbridge
      MYSQL_PASSWORD: foodbridge123
      SERVER_PORT: 8081
      JWT_SECRET: foodbridge-super-secret-key-change-in-production-min-32-chars
    ports:
      - "8081:8081"
    networks:
      - foodbridge-net

  # ── React + Vite Frontend ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: foodbridge-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_HOST: http://backend:8081
    ports:
      - "5173:5173"
    networks:
      - foodbridge-net

# ── Volumes ────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ── Networks ───────────────────────────────────────────────
networks:
  foodbridge-net:
    driver: bridge
