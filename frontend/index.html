<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon ─────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── SEO ─────────────────────────────────────────────────────── -->
    <title>FoodBridge – Smart Food Waste Reduction & Donation Platform</title>
    <meta
      name="description"
      content="FoodBridge connects food donors with recipients to reduce food waste and fight hunger in communities. Join us to make surplus food reach those who need it most."
    />
    <meta name="keywords" content="food donation, food waste reduction, NGO, charity, food bank, surplus food, community" />
    <meta name="author" content="FoodBridge Team" />
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph ──────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://foodbridge.app/" />
    <meta property="og:title" content="FoodBridge – Smart Food Waste Reduction & Donation Platform" />
    <meta
      property="og:description"
      content="Bridging the gap between food donors and recipients to reduce waste and fight hunger."
    />
    <meta property="og:image" content="https://foodbridge.app/og-image.png" />

    <!-- ── Twitter Card ────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FoodBridge" />
    <meta
      name="twitter:description"
      content="Smart Food Waste Reduction & Donation Platform"
    />

    <!-- ── Theme Color (Mobile Browsers) ───────────────────────────── -->
    <meta name="theme-color" content="#16a34a" />

    <!-- ── Google Fonts ────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-neutral-950 text-neutral-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
